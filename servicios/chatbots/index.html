<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chat Elegante</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #eef2f7, #d9e4f5);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-container {
      width: 100%;
      max-width: 850px;
      height: 90vh;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #003A8F, #0055A5);
      color: white;
      padding: 18px;
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease-in-out;
    }

    .user {
      background: linear-gradient(135deg, #0055A5, #007BFF);
      color: white;
      align-self: flex-end;
      text-align: right;
      border-bottom-right-radius: 4px;
    }

    .bot {
      background: #f1f5fb;
      color: #1a1a1a;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .input-container {
      display: flex;
      padding: 10px;
      border-top: 1px solid rgba(0,0,0,0.05);
      background: white;
    }

    input {
      flex: 1;
      padding: 12px 15px;
      border-radius: 10px;
      border: 1px solid #ddd;
      outline: none;
      font-size: 14px;
      transition: 0.2s;
    }

    input:focus {
      border-color: #0055A5;
      box-shadow: 0 0 0 2px rgba(0,85,165,0.1);
    }

    button {
      margin-left: 10px;
      padding: 0 20px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #003A8F, #0055A5);
      color: white;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Scroll elegante */
    .messages::-webkit-scrollbar {
      width: 6px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="chat-container">
  <div class="header">
    <div>BogoBank</div>
    <div style="font-size: 12px; opacity: 0.8;">Asistente virtual</div>
  </div>

  <div id="messages" class="messages"></div>

  <div class="input-container">
    <input id="input" type="text" placeholder="Escribe tu pregunta..." />
    <button onclick="sendMessage()">Enviar</button>
  </div>
</div>

<script>
  const API_URL = "http://127.0.0.1:8000/";

  function addMessage(text, type) {
    const messages = document.getElementById("messages");

    const div = document.createElement("div");
    div.classList.add("message", type);
    div.innerText = text;

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const loading = document.createElement("div");
    loading.classList.add("message", "bot");
    loading.innerText = "Pensando...";
    document.getElementById("messages").appendChild(loading);

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ question: text })
      });

      const data = await response.json();

      loading.remove();
      addMessage(data.answer, "bot");

    } catch (error) {
      loading.remove();
      addMessage("Error conectando con el servidor", "bot");
    }
  }

  document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      sendMessage();
    }
  });
</script>

</body>
</html>
