        <section class="demo-solicitud" data-aos="zoom-in" data-aos-duration="1000" data-aos-once="true">

                    <p class="demo-solicitud__subtitulo" id="demo-servicio-label">Completá el formulario; te respondo pronto.</p>

                    <form
                        class="form-demo"
                        id="form-demo"
                        method="post"
                    >
                        <!-- Envío: Web3Forms (ver ../js/web3forms-config.js y .github/workflows/github-pages.yml) -->
                        <input type="text" name="botcheck" class="form-demo__honeypot" value="" tabindex="-1" autocomplete="off" aria-hidden="true" title="No rellenar">

                        <div class="form-demo__fila form-demo__fila--2">

                                <label for="demo-nombre">Nombre</label>
                                <input type="text" id="demo-nombre" name="nombre" required autocomplete="given-name" maxlength="80">
                            </div>
                            <div class="form-demo__grupo">
                                <label for="demo-apellido">Apellido</label>
                                <input type="text" id="demo-apellido" name="apellido" required autocomplete="family-name" maxlength="80">

                        </div>
                        <div class="form-demo__grupo">
                            <label for="demo-correo">Correo electrónico</label>

                        </div>

                        <div class="form-demo__checkbox">

                        </div>
                        <div class="form-demo__grupo form-demo__grupo--empresa" id="grupo-empresa" hidden>
                            <label for="demo-nombre-empresa">Nombre de la empresa <span class="form-demo__req" aria-hidden="true">*</span></label>
                            <input type="text" id="demo-nombre-empresa" name="nombre_empresa" autocomplete="organization" maxlength="120">
                        </div>

                        <div class="btn-proyecto form-demo__enviar">
                            <button type="submit">solicitar Demo</button>
                        </div>
                    </form>

    <script src="../js/web3forms-config.js"></script>
    <script>
        (function () {
            const SERVICIOS = {
                'ing-prompt-que-obtienes': 'Ingeniería de Prompt — Qué obtienes',
                'ing-prompt-donde': 'Ingeniería de Prompt — Dónde lo aplicas',
                'ing-prompt-antes-despues': 'Ingeniería de Prompt — Antes y después (comparación)',
                'ag-rag': 'Agentes de IA — Agentes RAG',
                'ag-orq': 'Agentes de IA — Agentes Orquestadores',
                'ag-rag-orq': 'Agentes de IA — RAG + Orquestación',
                'md-lograr': 'Modelos de IA — ¿Qué puedes lograr?',
                'md-problema': 'Modelos de IA — Problema actual',
                'md-resultados': 'Modelos de IA — Resultados',
            };
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('s') || '';
            const servicio = SERVICIOS[slug] || 'Solicitud de demo (servicio no identificado; revisar enlace o referencia)';
            const sub = document.getElementById('demo-servicio-label');
            const inputServicio = document.getElementById('form-demo-servicio');
            const subj = document.getElementById('form-demo-subject');
            if (sub) sub.textContent = 'Solicitás demo para: ' + servicio;
            if (inputServicio) inputServicio.value = servicio;
            if (subj) subj.value = 'Nueva demo — ' + servicio;

            const chk = document.getElementById('demo-empresa');
            const wrap = document.getElementById('grupo-empresa');
            const inputEmp = document.getElementById('demo-nombre-empresa');
            function syncEmpresa() {
                const on = chk && chk.checked;
                if (wrap) {
                    wrap.hidden = !on;
                    if (inputEmp) {
                        inputEmp.toggleAttribute('required', !!on);
                        if (!on) {
                            inputEmp.value = '';
                            inputEmp.removeAttribute('aria-invalid');
                        }
                    }
                }
            }
            if (chk) {
                chk.addEventListener('change', syncEmpresa);
                syncEmpresa();
            }
        })();
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('form-demo');
            if (!form) return;
            const errEl = document.getElementById('form-demo-error');
            const WEB3FORMS_ACCESS_KEY =
                typeof window.__WEB3FORMS_ACCESS_KEY__ === 'string' ? window.__WEB3FORMS_ACCESS_KEY__.trim() : '';
            var graciasUrl = 'index.html?gracias=1';
            try {
                graciasUrl = new URL('index.html?gracias=1', window.location.href).href;
            } catch (ignore) {}

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                if (errEl) {
                    errEl.textContent = '';
                    errEl.hidden = true;
                }
                if (!WEB3FORMS_ACCESS_KEY) {
                    if (errEl) {
                        errEl.textContent =
                            'Falta el Access Key de Web3Forms: añadí el secret WEB3FORMS_ACCESS_KEY en GitHub (Actions) o completá window.__WEB3FORMS_ACCESS_KEY__ en js/web3forms-config.js.';
                        errEl.hidden = false;
                    } else {
                        window.alert('Configurá el Access Key en js/web3forms-config.js o en el secret del repositorio.');
                    }
                    return;
                }
                var btn = form.querySelector('button[type="submit"]');
                var fd = new FormData(form);
                if (fd.get('botcheck')) {
                    return;
                }
                var subj = document.getElementById('form-demo-subject');
                var nom = String(fd.get('nombre') || '').trim();
                var ap = String(fd.get('apellido') || '').trim();
                var serv = String(fd.get('servicio') || '');
                var checkEmp = document.getElementById('demo-empresa');
                var ne = String(fd.get('nombre_empresa') || '').trim();
                var em = String(fd.get('email') || '').trim();
                var payload = {
                    access_key: WEB3FORMS_ACCESS_KEY,
                    subject: subj && subj.value ? subj.value : 'Nueva demo — Mr Blue',
                    name: (nom + ' ' + ap).trim(),
                    email: em,
                    phone: String(fd.get('celular') || '').trim(),
                    servicio: serv,
                    consulta_empresa: checkEmp && checkEmp.checked ? 'Sí' : 'No',
                    nombre_empresa: checkEmp && checkEmp.checked && ne ? ne : '—',
                    message:
                        'Servicio: ' +
                        serv +
                        '\n' +
                        'Celular: ' +
                        String(fd.get('celular') || '') +
                        '\n' +
                        'Correo: ' +
                        em +
                        '\n' +
                        'Empresa: ' +
                        (checkEmp && checkEmp.checked && ne ? ne : '—') +
                        '\n'
                };
                var origText = btn ? btn.textContent : '';
                if (btn) {
                    btn.disabled = true;
                    btn.setAttribute('aria-busy', 'true');
                    btn.textContent = 'Enviando…';
                }
                function resetBtn() {
                    if (btn) {
                        btn.disabled = false;
                        btn.removeAttribute('aria-busy');
                        btn.textContent = origText || 'solicitar Demo';
                    }
                }
                fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
                    body: JSON.stringify(payload)
                })
                    .then(function (res) {
                        return res.json();
                    })
                    .then(function (data) {
                        if (data && data.success) {
                            window.location.href = graciasUrl;
                        } else {
                            if (errEl) {
                                errEl.textContent = (data && data.message) || 'No se pudo enviar. Intentá de nuevo en unos minutos.';
                                errEl.hidden = false;
                            } else {
                                window.alert((data && data.message) || 'Error al enviar');
                            }
                            resetBtn();
                        }
                    })
                    .catch(function () {
                        if (errEl) {
                            errEl.textContent = 'Error de conexión. Revisá la red o intentá más tarde.';
                            errEl.hidden = false;
                        } else {
                            window.alert('Error de conexión');
                        }
                        resetBtn();
                    });
            });
        });
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const botonModo = document.querySelector(".btn-dn");
            if (!botonModo) return;
            const iconoModo = botonModo.querySelector("img");
            if (!iconoModo) return;
            botonModo.addEventListener("click", () => {
                const bodyTieneModoOscuro = document.body.classList.toggle("modo-oscuro");
                if (bodyTieneModoOscuro) {
                    iconoModo.src = "../imagen/sol.png";
                    iconoModo.alt = "Modo día";
                } else {
                    iconoModo.src = "../imagen/luna (2).png";
                    iconoModo.alt = "Modo noche";
                }
            });
        });
    </script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
